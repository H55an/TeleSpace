version: '3.8'

services:
  # ------------------------------------
  # 1. خدمة قاعدة البيانات (PostgreSQL)
  # ------------------------------------
  db:
    image: postgres:15  # الصورة الموجودة لديك
    restart: always
    container_name: telespace_db
    environment:
      - PYTHONPATH=/apps
      - POSTGRES_USER=telespace_user      # اسم المستخدم الجديد
      - POSTGRES_PASSWORD=${DB_PASS}  # كلمة المرور الجديدة
      - POSTGRES_DB=telespace_db          # اسم قاعدة البيانات
    volumes:
      - pg_data:/var/lib/postgresql/data  # لحفظ البيانات بشكل دائم
    ports:
      - "5434:5432" # (اختياري) للوصول للقاعدة من DBeaver عبر المنفذ 5433

  # ------------------------------------
  # 2. سيرفر تيليجرام المحلي
  # ------------------------------------
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      - PYTHONPATH=/apps
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-data:/var/lib/telegram-bot-api

  # ------------------------------------
  # 3. البوت (Python Bot)
  # ------------------------------------
  bot:
    build: .
    restart: always
    depends_on:
      - telegram-bot-api
      - db
    environment:
      - PYTHONPATH=/apps
      # الرابط الداخلي لقاعدة البيانات (لاحظ اسم الهوست هو db)
      - DATABASE_URL=${DATABASE_URL}
      - API_SERVER_URL=http://telegram-bot-api:8081
    volumes:
      - telegram-data:/var/lib/telegram-bot-api
      - ./static:/apps/static
    command: ["python", "-m", "app.bot.main"]

  # ------------------------------------
  # 4. واجهة التطبيقات (API)
  # ------------------------------------
  api:
    build: .
    restart: always
    depends_on:
      - telegram-bot-api
      - db
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/apps
      # نفس الرابط الداخلي لقاعدة البيانات
      - DATABASE_URL=${DATABASE_URL}
      - API_SERVER_URL=http://telegram-bot-api:8081
    volumes:
      - telegram-data:/var/lib/telegram-bot-api
      - ./static:/apps/static
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

# تعريف وحدات التخزين
volumes:
  telegram-data:
  pg_data: